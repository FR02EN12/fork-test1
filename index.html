<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>테트리스 - 바이브 코딩 실습</title>
  <style>
    /* ===== 기본 레이아웃 ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Consolas', monospace;
      color: #e2e8f0;
    }

    .game-container {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    /* ===== 게임 캔버스 ===== */
    #gameCanvas {
      border: 2px solid #334155;
      background: #0f172a;
      display: block;
    }

    /* ===== 다음 블록 미리보기 캔버스 ===== */
    #nextCanvas {
      width: 70px;
      height: 70px;
      border: 1px solid #334155;
      background: #0f172a;
      display: block;
      margin: 0 auto;
    }

    /* ===== 사이드 패널 ===== */
    .side-panel {
      width: 150px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
    }

    .panel-box h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .panel-box .value {
      font-size: 28px;
      font-weight: bold;
      color: #e2e8f0;
    }

    /* 게임 오버 오버레이 */
    #overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      font-size: 24px;
      color: #f1f5f9;
    }

    #overlay.show { display: flex; }

    #restartBtn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 28px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Consolas', monospace;
    }

    #restartBtn:hover {
      background: #2563eb;
    }

    .canvas-wrapper {
      position: relative;
    }

    /* 조작 안내 */
    .controls {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="game-container">

  <!-- 메인 캔버스 -->
  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="300" height="600"></canvas>
    <div id="overlay">
      <div>GAME OVER</div>
      <button id="restartBtn">다시 시작</button>
    </div>
  </div>

  <!-- 사이드 패널 -->
  <div class="side-panel">
    <div class="panel-box">
      <h3>다음 블록</h3>
      <canvas id="nextCanvas" width="70" height="70"></canvas>
    </div>

    <div class="panel-box">
      <h3>점수</h3>
      <div class="value" id="scoreDisplay">0</div>
    </div>

    <div class="panel-box">
      <h3>레벨</h3>
      <div class="value" id="levelDisplay">1</div>
    </div>

    <div class="panel-box">
      <h3>라인</h3>
      <div class="value" id="linesDisplay">0</div>
    </div>

    <div class="panel-box controls">
      <h3>조작법</h3>
      ← → 이동<br>
      ↑ 회전<br>
      ↓ 빠르게<br>
      Space 하드드롭
    </div>
  </div>

</div>

<script>
// ============================================================
//  ■ 상수 정의
// ============================================================
const COLS       = 10;      // 보드 가로 칸 수
const ROWS       = 20;      // 보드 세로 칸 수
const BLOCK_SIZE = 30;      // 메인 보드 블록 크기

const PREVIEW_SIZE       = 70;  // 다음 블록 미리보기 캔버스 크기
const PREVIEW_BLOCK_SIZE = 16;  // 미리보기 블록 크기

// 테트리스 블록 7종 모양
const SHAPES = {
  I: [[1, 1, 1, 1]],
  O: [[1, 1],
      [1, 1]],
  T: [[0, 1, 0],
      [1, 1, 1]],
  S: [[0, 1, 1],
      [1, 1, 0]],
  Z: [[1, 1, 0],
      [0, 1, 1]],
  L: [[1, 0],
      [1, 0],
      [1, 1]],
  J: [[0, 1],
      [0, 1],
      [1, 1]],
};

// 블록별 색상
const COLORS = {
  I: '#00f0f0',
  O: '#f0f000',
  T: '#a000f0',
  S: '#00f000',
  Z: '#f00000',
  L: '#f0a000',
  J: '#0000f0',
};

// 블록 종류 목록
const PIECE_TYPES = Object.keys(SHAPES);

// ============================================================
//  ■ 캔버스 초기화
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

const nextCanvas = document.getElementById('nextCanvas');
const nextCtx    = nextCanvas.getContext('2d');

// ============================================================
//  ■ 게임 상태 변수
// ============================================================
let board        = [];       // 2D 배열: null = 빈칸, 색상 문자열 = 블록
let currentPiece = null;     // 현재 떨어지는 블록
let nextPiece    = null;     // 다음에 나올 블록

let score        = 0;
let level        = 1;
let linesCleared = 0;
let gameOver     = false;

let lastTime     = 0;
let dropInterval = 1000;     // 자동 하강 간격: 1000ms에서 시작, 최소 100ms
let animationId  = null;

// ============================================================
//  ■ 메인 보드 블록 그리기
// ============================================================
function drawBlock(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(
    x * BLOCK_SIZE,
    y * BLOCK_SIZE,
    BLOCK_SIZE - 1,
    BLOCK_SIZE - 1
  );

  // 윗면 하이라이트
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(
    x * BLOCK_SIZE,
    y * BLOCK_SIZE,
    BLOCK_SIZE - 1,
    4
  );
}

// ============================================================
//  ■ 다음 블록 미리보기용 블록 그리기
// ============================================================
function drawPreviewBlock(x, y, color) {
  nextCtx.fillStyle = color;
  nextCtx.fillRect(
    x,
    y,
    PREVIEW_BLOCK_SIZE - 1,
    PREVIEW_BLOCK_SIZE - 1
  );

  // 미리보기 블록 하이라이트
  nextCtx.fillStyle = 'rgba(255,255,255,0.2)';
  nextCtx.fillRect(
    x,
    y,
    PREVIEW_BLOCK_SIZE - 1,
    3
  );
}

// ============================================================
//  ■ 보드 초기화
// ============================================================
function initBoard() {
  // ROWS개의 행을 만들고, 각 행은 COLS개의 null로 초기화합니다.
  board = [];

  for (let row = 0; row < ROWS; row++) {
    board.push(new Array(COLS).fill(null));
  }
}

// ============================================================
//  ■ 랜덤 블록 객체 생성
// ============================================================
function createRandomPiece() {
  // PIECE_TYPES 중 랜덤으로 하나를 선택합니다.
  const type = PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];

  return {
    shape: SHAPES[type],
    color: COLORS[type],
    x: 0,
    y: 0
  };
}

// ============================================================
//  ■ 현재 블록 생성 + 다음 블록 갱신
// ============================================================
function createPiece() {
  // 첫 생성 시에는 nextPiece가 없으므로 먼저 하나를 준비합니다.
  if (nextPiece === null) {
    nextPiece = createRandomPiece();
  }

  // 다음 블록을 현재 블록으로 가져옵니다.
  currentPiece = nextPiece;

  // 현재 블록은 보드 중앙 상단에서 시작합니다.
  currentPiece.x = Math.floor((COLS - currentPiece.shape[0].length) / 2);
  currentPiece.y = 0;

  // 새로운 다음 블록을 생성합니다.
  nextPiece = createRandomPiece();

  // 오른쪽 패널의 다음 블록 미리보기를 갱신합니다.
  drawNextPiece();
}

// ============================================================
//  ■ 충돌 검사
// ============================================================
function isCollision(piece, dx, dy) {
  // piece를 dx, dy만큼 이동했을 때 벽, 바닥, 기존 블록과 충돌하는지 검사합니다.
  for (let row = 0; row < piece.shape.length; row++) {
    for (let col = 0; col < piece.shape[row].length; col++) {
      // 0인 칸은 실제 블록이 아니므로 검사하지 않습니다.
      if (piece.shape[row][col] === 0) continue;

      const newX = piece.x + col + dx;
      const newY = piece.y + row + dy;

      // 왼쪽, 오른쪽 벽 충돌
      if (newX < 0 || newX >= COLS) {
        return true;
      }

      // 바닥 충돌
      if (newY >= ROWS) {
        return true;
      }

      // 보드 안쪽에서 기존 블록과 충돌
      if (newY >= 0 && board[newY][newX] !== null) {
        return true;
      }
    }
  }

  return false;
}

// ============================================================
//  ■ 90도 시계 방향 회전
// ============================================================
function rotate(shape) {
  const rows = shape.length;
  const cols = shape[0].length;
  const rotated = [];

  // 회전 후 배열 크기는 cols × rows가 됩니다.
  for (let row = 0; row < cols; row++) {
    const newRow = [];

    for (let col = 0; col < rows; col++) {
      newRow.push(shape[rows - 1 - col][row]);
    }

    rotated.push(newRow);
  }

  return rotated;
}

// ============================================================
//  ■ 현재 블록을 board에 고정
// ============================================================
function placePiece() {
  if (!currentPiece) return;

  // currentPiece의 shape을 순회하며 1인 칸만 board에 색상으로 저장합니다.
  for (let row = 0; row < currentPiece.shape.length; row++) {
    for (let col = 0; col < currentPiece.shape[row].length; col++) {
      if (currentPiece.shape[row][col] === 0) continue;

      const boardX = currentPiece.x + col;
      const boardY = currentPiece.y + row;

      // 보드 범위 안에 있는 칸만 고정합니다.
      if (
        boardY >= 0 &&
        boardY < ROWS &&
        boardX >= 0 &&
        boardX < COLS
      ) {
        board[boardY][boardX] = currentPiece.color;
      }
    }
  }
}

// ============================================================
//  ■ 완성된 줄 제거 + 점수/레벨/속도 갱신
// ============================================================
function clearLines() {
  let cleared = 0;

  // 아래 행부터 검사해야 여러 줄 제거 시 인덱스가 꼬이지 않습니다.
  for (let row = ROWS - 1; row >= 0; row--) {
    const isFull = board[row].every(cell => cell !== null);

    if (isFull) {
      // 가득 찬 행을 제거합니다.
      board.splice(row, 1);

      // 맨 위에 빈 행을 추가합니다.
      board.unshift(new Array(COLS).fill(null));

      cleared++;

      // 같은 row 인덱스에 위 행이 내려왔으므로 다시 검사합니다.
      row++;
    }
  }

  if (cleared > 0) {
    // 제거한 줄 수에 따른 기본 점수입니다.
    const points = [0, 100, 300, 500, 800];

    // 현재 레벨 기준으로 점수를 계산합니다.
    score += points[cleared] * level;

    // 누적 제거 줄 수를 갱신합니다.
    linesCleared += cleared;

    // 10줄 제거마다 레벨이 1씩 증가합니다.
    level = Math.floor(linesCleared / 10) + 1;

    // 레벨에 따라 자동 하강 속도를 빠르게 만듭니다.
    // 1000ms에서 시작하여 레벨마다 100ms씩 감소하고, 최소 100ms까지만 내려갑니다.
    dropInterval = Math.max(100, 1000 - (level - 1) * 100);
  }
}

// ============================================================
//  ■ 다음 블록 미리보기 그리기
// ============================================================
function drawNextPiece() {
  // 미리보기 캔버스를 초기화합니다.
  nextCtx.fillStyle = '#0f172a';
  nextCtx.fillRect(0, 0, PREVIEW_SIZE, PREVIEW_SIZE);

  if (!nextPiece) return;

  const shape = nextPiece.shape;

  // 블록 모양을 70×70 캔버스 중앙에 배치하기 위한 오프셋입니다.
  const shapeWidth  = shape[0].length * PREVIEW_BLOCK_SIZE;
  const shapeHeight = shape.length * PREVIEW_BLOCK_SIZE;
  const offsetX     = Math.floor((PREVIEW_SIZE - shapeWidth) / 2);
  const offsetY     = Math.floor((PREVIEW_SIZE - shapeHeight) / 2);

  // nextPiece.shape을 순회하며 1인 칸만 미리보기 캔버스에 그립니다.
  for (let row = 0; row < shape.length; row++) {
    for (let col = 0; col < shape[row].length; col++) {
      if (shape[row][col] === 1) {
        drawPreviewBlock(
          offsetX + col * PREVIEW_BLOCK_SIZE,
          offsetY + row * PREVIEW_BLOCK_SIZE,
          nextPiece.color
        );
      }
    }
  }
}

// ============================================================
//  ■ 메인 화면 그리기
// ============================================================
function draw() {
  // 배경 지우기
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 격자 선 그리기
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 0.5;

  for (let col = 0; col < COLS; col++) {
    ctx.beginPath();
    ctx.moveTo(col * BLOCK_SIZE, 0);
    ctx.lineTo(col * BLOCK_SIZE, canvas.height);
    ctx.stroke();
  }

  for (let row = 0; row < ROWS; row++) {
    ctx.beginPath();
    ctx.moveTo(0, row * BLOCK_SIZE);
    ctx.lineTo(canvas.width, row * BLOCK_SIZE);
    ctx.stroke();
  }

  // board에 고정된 블록 그리기
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      if (board[row][col] !== null) {
        drawBlock(col, row, board[row][col]);
      }
    }
  }

  // 현재 떨어지는 블록 그리기
  if (currentPiece) {
    for (let row = 0; row < currentPiece.shape.length; row++) {
      for (let col = 0; col < currentPiece.shape[row].length; col++) {
        if (currentPiece.shape[row][col] === 1) {
          drawBlock(
            currentPiece.x + col,
            currentPiece.y + row,
            currentPiece.color
          );
        }
      }
    }
  }

  // 다음 블록 미리보기도 함께 갱신합니다.
  drawNextPiece();
}

// ============================================================
//  ■ 블록 고정 후 다음 블록 생성
// ============================================================
function lockPieceAndCreateNext() {
  // 현재 블록을 board에 고정합니다.
  placePiece();

  // 완성된 줄을 제거하고 점수, 레벨, 속도를 갱신합니다.
  clearLines();
  updateUI();

  // 다음 블록을 현재 블록으로 가져오고, 새 nextPiece를 만듭니다.
  createPiece();

  // 새 블록이 생성 직후 충돌하면 게임 오버입니다.
  if (isCollision(currentPiece, 0, 0)) {
    gameOver = true;
    showGameOver();
  }

  // 수동 드롭 직후 바로 자동 하강이 겹치지 않도록 기준 시간을 갱신합니다.
  lastTime = performance.now();
}

// ============================================================
//  ■ 키보드 입력 처리
// ============================================================
document.addEventListener('keydown', (e) => {
  const isControlKey =
    e.key === 'ArrowLeft' ||
    e.key === 'ArrowRight' ||
    e.key === 'ArrowDown' ||
    e.key === 'ArrowUp' ||
    e.code === 'Space';

  // 방향키와 스페이스바 입력 시 페이지 스크롤을 막습니다.
  if (isControlKey) {
    e.preventDefault();
  }

  if (gameOver) return;
  if (!currentPiece) return;

  const key = e.code === 'Space' ? 'Space' : e.key;

  switch (key) {
    case 'ArrowLeft':
      // 왼쪽 이동: 충돌이 없을 때만 이동합니다.
      if (!isCollision(currentPiece, -1, 0)) {
        currentPiece.x -= 1;
      }
      break;

    case 'ArrowRight':
      // 오른쪽 이동: 충돌이 없을 때만 이동합니다.
      if (!isCollision(currentPiece, 1, 0)) {
        currentPiece.x += 1;
      }
      break;

    case 'ArrowDown':
      // 빠른 하강: 아래로 한 칸 이동하거나, 충돌 시 블록을 고정합니다.
      if (!isCollision(currentPiece, 0, 1)) {
        currentPiece.y += 1;
      } else {
        lockPieceAndCreateNext();
      }
      break;

    case 'ArrowUp': {
      // 회전 후 충돌이 없으면 실제 shape을 교체합니다.
      const rotatedShape = rotate(currentPiece.shape);
      const rotatedPiece = {
        ...currentPiece,
        shape: rotatedShape
      };

      if (!isCollision(rotatedPiece, 0, 0)) {
        currentPiece.shape = rotatedShape;
      }
      break;
    }

    case 'Space':
      // 하드드롭: 충돌 직전까지 즉시 아래로 이동합니다.
      while (!isCollision(currentPiece, 0, 1)) {
        currentPiece.y += 1;
      }

      // 바닥 또는 블록 위에 도달하면 즉시 고정합니다.
      lockPieceAndCreateNext();
      break;
  }

  // 키 입력 후 화면을 즉시 갱신합니다.
  draw();
});

// ============================================================
//  ■ 게임 루프
// ============================================================
function gameLoop(timestamp) {
  // 게임 오버 상태면 requestAnimationFrame 반복을 중단합니다.
  if (gameOver) return;

  // 첫 프레임에서는 기준 시간을 현재 timestamp로 설정합니다.
  if (lastTime === 0) {
    lastTime = timestamp;
  }

  const deltaTime = timestamp - lastTime;

  // dropInterval마다 자동으로 한 칸 하강합니다.
  if (deltaTime >= dropInterval) {
    if (!isCollision(currentPiece, 0, 1)) {
      currentPiece.y += 1;
    } else {
      lockPieceAndCreateNext();

      // 새 블록 생성 직후 충돌하면 게임 오버 처리 후 루프를 종료합니다.
      if (gameOver) {
        draw();
        return;
      }
    }

    // 자동 하강 기준 시간을 갱신합니다.
    lastTime = timestamp;
  }

  // 매 프레임 화면을 다시 그립니다.
  draw();

  // requestAnimationFrame 구조를 유지합니다.
  animationId = requestAnimationFrame(gameLoop);
}

// ============================================================
//  ■ UI 업데이트
// ============================================================
function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('linesDisplay').textContent = linesCleared;
}

// ============================================================
//  ■ 게임 오버 표시
// ============================================================
function showGameOver() {
  document.getElementById('overlay').classList.add('show');
}

// ============================================================
//  ■ 게임 시작 / 재시작
// ============================================================
function startGame() {
  // 기존 animationFrame이 남아 있으면 중복 루프를 방지합니다.
  if (animationId !== null) {
    cancelAnimationFrame(animationId);
  }

  initBoard();

  currentPiece = null;
  nextPiece    = null;

  score        = 0;
  level        = 1;
  linesCleared = 0;
  gameOver     = false;

  lastTime     = 0;
  dropInterval = 1000;

  // 첫 currentPiece와 nextPiece를 준비합니다.
  createPiece();

  updateUI();

  document.getElementById('overlay').classList.remove('show');

  draw();

  // requestAnimationFrame 구조로 게임 루프를 시작합니다.
  animationId = requestAnimationFrame(gameLoop);
}

document.getElementById('restartBtn').addEventListener('click', startGame);

// 게임 시작
startGame();
</script>
</body>
</html>
